<!DOCTYPE html>
<html>
<head>
    <title>SimilarityLens - Cross Browser Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', monospace;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        
        /* Collaboration Widget */
        .collab-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #a78bfa;
            z-index: 10000;
            font-size: 12px;
            min-width: 250px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            font-family: monospace;
        }
        .collab-widget button {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin: 3px;
            font-size: 11px;
            font-weight: bold;
        }
        .collab-widget button:hover { opacity: 0.8; transform: scale(0.98); }
        .status-connected { background: rgba(74,222,128,0.2); color: #4ade80; padding: 5px; border-radius: 4px; margin: 5px 0; }
        .status-waiting { background: rgba(234,179,8,0.2); color: #facc15; padding: 5px; border-radius: 4px; margin: 5px 0; }
        .room-id { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 14px; font-weight: bold; }
        
        /* Image upload areas */
        .upload-area {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px;
            display: inline-block;
            width: 45%;
            vertical-align: top;
        }
        .upload-area h3 { margin-bottom: 15px; color: #a78bfa; }
        .preview { margin-top: 15px; min-height: 200px; text-align: center; }
        .preview img { max-width: 100%; max-height: 200px; border-radius: 8px; }
        input[type="file"] { margin: 10px 0; }
        
        .compare-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .results {
            text-align: center;
            margin: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
        }
        .similarity-score { font-size: 48px; font-weight: bold; color: #a78bfa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 SimilarityLens - Cross Browser Test</h1>
        <p style="text-align: center; margin-bottom: 30px;">Open this page in Chrome AND Edge → Create room in one, Join in the other → Share images → Compare!</p>
        
        <div style="text-align: center;">
            <div class="upload-area">
                <h3>📷 IMAGE A (Reference)</h3>
                <input type="file" id="fileA" accept="image/*">
                <div class="preview" id="previewA"></div>
            </div>
            
            <div class="upload-area">
                <h3>🖼️ IMAGE B (Test)</h3>
                <input type="file" id="fileB" accept="image/*">
                <div class="preview" id="previewB"></div>
            </div>
        </div>
        
        <button class="compare-btn" id="compareBtn">🚀 RUN SIMILARITY COMPARISON</button>
        
        <div class="results" id="results">
            <div>Similarity Score</div>
            <div class="similarity-score" id="similarityScore">---</div>
            <div id="percentScore"></div>
        </div>
    </div>
    
    <!-- Collaboration Widget -->
    <div class="collab-widget">
        <div style="margin-bottom: 10px;"><strong>🤝 Cross-Browser Share</strong></div>
        <div id="statusMsg" class="status-waiting">⚡ Not connected</div>
        <div style="margin: 8px 0;">
            Room: <span class="room-id" id="roomIdDisplay">---</span>
        </div>
        <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px;">
            <button id="createRoomBtn">🏠 Create Room</button>
            <button id="joinRoomBtn">🔗 Join Room</button>
        </div>
        <div style="border-top: 1px solid rgba(255,255,255,0.2); margin: 8px 0;"></div>
        <div style="font-size: 10px; margin-bottom: 5px;">Share your images:</div>
        <div style="display: flex; gap: 5px;">
            <button id="shareLeftBtn">📸 Share Left (A)</button>
            <button id="shareRightBtn">📸 Share Right (B)</button>
        </div>
        <div style="margin-top: 10px; font-size: 10px;">
            <div>📥 From Partner:</div>
            <div id="partnerPreview" style="margin-top: 5px;"></div>
        </div>
    </div>
    
    <script>
        // ==================== CROSS-BROWSER COLLABORATION ====================
        let myRoomId = null;
        let mySessionId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        let pollingInterval = null;
        
        // Image storage
        let myLeftImage = null;
        let myRightImage = null;
        let partnerLeftImage = null;
        let partnerRightImage = null;
        
        async function createSession() {
            try {
                const response = await fetch('/collab/create', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                const data = await response.json();
                myRoomId = data.roomId;
                document.getElementById('roomIdDisplay').innerText = myRoomId;
                document.getElementById('statusMsg').innerHTML = '🟡 Waiting for partner...';
                document.getElementById('statusMsg').className = 'status-waiting';
                startPolling();
                console.log('✅ Created room:', myRoomId);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('statusMsg').innerHTML = '❌ Error creating room';
            }
        }
        
        async function joinSession() {
            const roomId = prompt('Enter Room ID:', myRoomId);
            if (roomId) {
                myRoomId = roomId;
                try {
                    const response = await fetch('/collab/join', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomId: myRoomId, sessionId: mySessionId })
                    });
                    const data = await response.json();
                    if (data.status === 'paired') {
                        document.getElementById('statusMsg').innerHTML = '🟢 Partner Connected!';
                        document.getElementById('statusMsg').className = 'status-connected';
                    } else {
                        document.getElementById('statusMsg').innerHTML = '🟡 Waiting for partner...';
                        document.getElementById('statusMsg').className = 'status-waiting';
                    }
                    startPolling();
                    document.getElementById('roomIdDisplay').innerText = myRoomId;
                } catch (error) {
                    console.error('Error:', error);
                    document.getElementById('statusMsg').innerHTML = '❌ Error joining room';
                }
            }
        }
        
        async function shareImage(side) {
            if (!myRoomId) { 
                alert('Create or join a room first!'); 
                return; 
            }
            
            const file = side === 'left' ? myLeftImage : myRightImage;
            if (!file) { 
                alert(`Please upload an image on ${side} side first`); 
                return; 
            }
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    await fetch('/collab/share', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            roomId: myRoomId, 
                            side: side, 
                            imageData: e.target.result 
                        })
                    });
                    const oldMsg = document.getElementById('statusMsg').innerHTML;
                    document.getElementById('statusMsg').innerHTML = `📤 Shared ${side} image`;
                    setTimeout(() => {
                        document.getElementById('statusMsg').innerHTML = oldMsg;
                    }, 2000);
                } catch (error) { 
                    console.error('Share error:', error);
                    alert('Error sharing image');
                }
            };
            reader.readAsDataURL(file);
        }
        
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            
            pollingInterval = setInterval(async () => {
                if (!myRoomId) return;
                
                try {
                    const response = await fetch('/collab/get/' + myRoomId);
                    const data = await response.json();
                    
                    if (data.hasPartner) {
                        document.getElementById('statusMsg').innerHTML = '🟢 Partner Connected!';
                        document.getElementById('statusMsg').className = 'status-connected';
                    }
                    
                    // Check for partner images
                    if (data.images) {
                        let previewHtml = '';
                        if (data.images.left_image) {
                            partnerLeftImage = data.images.left_image;
                            previewHtml += `<div style="margin-top: 5px;"><strong>Left (A):</strong></div>
                                           <img src="${data.images.left_image}" style="max-width: 80px; border-radius: 4px; border: 1px solid #a78bfa;">`;
                        }
                        if (data.images.right_image) {
                            partnerRightImage = data.images.right_image;
                            previewHtml += `<div style="margin-top: 5px;"><strong>Right (B):</strong></div>
                                           <img src="${data.images.right_image}" style="max-width: 80px; border-radius: 4px; border: 1px solid #ec4899;">`;
                        }
                        if (previewHtml) {
                            document.getElementById('partnerPreview').innerHTML = previewHtml;
                        }
                    }
                } catch (error) { 
                    console.error('Polling error:', error); 
                }
            }, 2000);
        }
        
        // ==================== IMAGE HANDLING ====================
        document.getElementById('fileA').addEventListener('change', (e) => {
            myLeftImage = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => { 
                document.getElementById('previewA').innerHTML = `<img src="${ev.target.result}">`; 
            };
            if (myLeftImage) reader.readAsDataURL(myLeftImage);
        });
        
        document.getElementById('fileB').addEventListener('change', (e) => {
            myRightImage = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => { 
                document.getElementById('previewB').innerHTML = `<img src="${ev.target.result}">`; 
            };
            if (myRightImage) reader.readAsDataURL(myRightImage);
        });
        
        // ==================== COMPARISON ====================
        async function base64ToFile(base64, filename) {
            const res = await fetch(base64);
            const blob = await res.blob();
            return new File([blob], filename, { type: 'image/png' });
        }
        
        document.getElementById('compareBtn').addEventListener('click', async () => {
            // Use our images OR partner's images
            let image1 = myLeftImage;
            let image2 = myRightImage;
            
            if (!image1 && partnerLeftImage) {
                image1 = await base64ToFile(partnerLeftImage, 'partner-left.png');
            }
            if (!image2 && partnerRightImage) {
                image2 = await base64ToFile(partnerRightImage, 'partner-right.png');
            }
            
            if (!image1 || !image2) {
                alert('Need two images! Upload yours or wait for partner to share.');
                return;
            }
            
            const formData = new FormData();
            formData.append('image1', image1);
            formData.append('image2', image2);
            
            document.getElementById('similarityScore').innerHTML = '⏳ Computing...';
            
            try {
                const response = await fetch('/compare/serial', { 
                    method: 'POST', 
                    body: formData 
                });
                const result = await response.json();
                document.getElementById('similarityScore').innerHTML = result.ssim;
                document.getElementById('percentScore').innerHTML = `${result.percent} similarity`;
            } catch (error) {
                console.error('Comparison error:', error);
                document.getElementById('similarityScore').innerHTML = 'Error';
                document.getElementById('percentScore').innerHTML = 'Check console';
            }
        });
        
        // Initialize buttons
        document.getElementById('createRoomBtn').onclick = createSession;
        document.getElementById('joinRoomBtn').onclick = joinSession;
        document.getElementById('shareLeftBtn').onclick = () => shareImage('left');
        document.getElementById('shareRightBtn').onclick = () => shareImage('right');
        
        console.log('✅ Collaboration ready! Session:', mySessionId);
    </script>
</body>
</html>
